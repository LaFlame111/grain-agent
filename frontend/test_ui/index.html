<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粮情分析智能体 V008 - 交互测试终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 180px); }
        .reasoning-container { height: calc(50vh - 60px); }
        .tools-container { height: calc(50vh - 60px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .code-block { font-family: 'Consolas', 'Monaco', monospace; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <!-- Header -->
    <nav class="bg-blue-800 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-white font-bold text-xl flex items-center">
                <span class="mr-2">🌾</span> 粮情分析智能体 V008 终端
            </div>
            <div class="text-blue-200 text-sm">
                后端状态: <span id="server-status" class="text-green-400">正在检查...</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto flex flex-col md:flex-row p-4 gap-4">
        
        <!-- Left: Chat Area -->
        <div class="w-full md:w-3/5 flex flex-col gap-4">
            <div class="bg-white rounded-lg shadow-md p-4 chat-container flex flex-col">
                <div id="chat-messages" class="flex-grow overflow-y-auto mb-4 space-y-4 p-2">
                    <!-- Welcome Message -->
                    <div class="flex items-start">
                        <div class="bg-blue-100 text-blue-800 p-3 rounded-lg max-w-xs md:max-w-md shadow-sm">
                            你好！我是粮情分析智能体 V008。我已经连接到了 WMS 真实接口。你可以询问我关于仓房清单、粮情数据、趋势预测或生成报告。
                        </div>
                    </div>
                </div>
                
                <!-- Input Area -->
                <div class="flex items-center gap-2 border-t pt-4">
                    <input type="text" id="user-input" 
                        class="flex-grow border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" 
                        placeholder="输入您的问题，例如：查询 Q1 仓的基本情况...">
                    <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full transition duration-200 flex items-center gap-1">
                        发送
                        <span id="loading-spinner" class="hidden animate-spin">⏳</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right: Details Area -->
        <div class="w-full md:w-2/5 flex flex-col gap-4">
            
            <!-- Quick Actions -->
            <div class="bg-white rounded-lg shadow-md p-4">
                <h3 class="font-bold text-gray-700 mb-3 flex items-center border-b pb-2">
                    <span class="mr-2">⚡</span> 快捷指令集
                </h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="sendQuery('我想了解当前连接的仓房列表。')" class="text-sm bg-gray-100 hover:bg-blue-50 border border-gray-200 p-2 rounded text-left truncate transition">🔍 接入清单</button>
                    <button onclick="sendQuery('我想了解 Q1 仓的基本情况。')" class="text-sm bg-gray-100 hover:bg-blue-50 border border-gray-200 p-2 rounded text-left truncate transition">🏠 Q1 详情</button>
                    <button onclick="sendQuery('请为 Q1 仓生成一份 2026年1月1日到5日 的三温图。')" class="text-sm bg-gray-100 hover:bg-blue-50 border border-gray-200 p-2 rounded text-left truncate transition">📈 Q1 三温图</button>
                    <button onclick="sendQuery('请为 Q1 仓生成一份 2026年1月1日到5日 的分析报告文档。')" class="text-sm bg-gray-100 hover:bg-blue-50 border border-gray-200 p-2 rounded text-left truncate transition">📄 分析文档生成</button>
                </div>
            </div>

            <!-- Reasoning -->
            <div class="bg-gray-900 rounded-lg shadow-md p-4 reasoning-container overflow-hidden flex flex-col">
                <h3 class="font-bold text-blue-400 mb-2 flex items-center border-b border-gray-700 pb-1 italic">
                    <span class="mr-2">🧠</span> 推理思维链 (Reasoning)
                </h3>
                <div id="reasoning-text" class="text-gray-300 text-sm overflow-y-auto whitespace-pre-wrap flex-grow scrollbar-hide">
                    等待对话开始...
                </div>
            </div>

            <!-- Tools -->
            <div class="bg-gray-800 rounded-lg shadow-md p-4 tools-container overflow-hidden flex flex-col">
                <h3 class="font-bold text-green-400 mb-2 flex items-center border-b border-gray-700 pb-1 italic">
                    <span class="mr-2">🛠️</span> 工具调用记录 (Tools)
                </h3>
                <div id="tools-data" class="text-green-300 text-xs overflow-y-auto flex-grow code-block scrollbar-hide">
                    暂无调用记录
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const reasoningText = document.getElementById('reasoning-text');
        const toolsData = document.getElementById('tools-data');
        const serverStatus = document.getElementById('server-status');

        const API_URL = 'http://127.0.0.1:8000/api/v1/agent/chat';

        // 检查服务器状态
        async function checkServer() {
            try {
                const response = await fetch('http://127.0.0.1:8000/', { timeout: 2000 });
                if (response.ok) {
                    serverStatus.textContent = '在线';
                    serverStatus.className = 'text-green-400 font-bold';
                } else {
                    serverStatus.textContent = '离线';
                    serverStatus.className = 'text-red-400 font-bold';
                }
            } catch (e) {
                serverStatus.textContent = '无法连接';
                serverStatus.className = 'text-red-400 font-bold';
            }
        }
        checkServer();
        setInterval(checkServer, 10000);

        function appendMessage(role, text, data = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-4`;
            
            const div = document.createElement('div');
            div.className = `p-3 rounded-lg max-w-xs md:max-w-md shadow-sm ${
                role === 'user' ? 'bg-blue-600 text-white rounded-br-none' : 'bg-gray-200 text-gray-800 rounded-bl-none'
            }`;
            
            // 处理文本中的换行
            const content = document.createElement('div');
            content.className = "whitespace-pre-wrap";
            content.textContent = text;
            div.appendChild(content);

            // 如果有数据且包含文件路径，尝试生成下载按钮
            if (data && data.tool_calls) {
                data.tool_calls.forEach(call => {
                    const result = data.raw_results ? data.raw_results[call.tool] : null;
                    if (result && result.file_path) {
                        const filePath = result.file_path;
                        // 将绝对路径转换为相对路径
                        // 示例: G:\grain_agent\V008\artifacts\reports\xxx.docx -> /artifacts/reports/xxx.docx
                        let relativePath = "";
                        if (filePath.includes('artifacts')) {
                            relativePath = '/artifacts' + filePath.split('artifacts')[1].replace(/\\/g, '/');
                        }

                        if (relativePath) {
                            const btn = document.createElement('a');
                            btn.href = `http://127.0.0.1:8000${relativePath}`;
                            btn.target = "_blank";
                            btn.className = "mt-3 block bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-2 px-3 rounded flex items-center justify-center gap-2 transition";
                            btn.innerHTML = `<span>📥 下载生成的文件</span>`;
                            div.appendChild(btn);
                        }
                    }
                });
            }
            
            wrapper.appendChild(div);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendQuery(queryText) {
            const text = queryText || userInput.value.trim();
            if (!text) return;

            if (!queryText) userInput.value = '';
            
            appendMessage('user', text);
            
            // UI 状态
            sendBtn.disabled = true;
            loadingSpinner.classList.remove('hidden');
            reasoningText.textContent = "Agent 正在思考中...";
            toolsData.textContent = "正在调用工具...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // 1. 显示回答
                    appendMessage('agent', data.answer, data);
                    
                    // 2. 显示推理
                    reasoningText.textContent = data.reasoning || "无推理记录";
                    
                    // 3. 显示工具调用
                    if (data.tool_calls && data.tool_calls.length > 0) {
                        toolsData.innerHTML = '';
                        data.tool_calls.forEach(call => {
                            const pre = document.createElement('pre');
                            pre.className = "mb-4 border-b border-gray-700 pb-2";
                            pre.innerHTML = `<span class="text-blue-300">[Tool]</span> ${call.tool}\n<span class="text-gray-400">[Params]</span> ${JSON.stringify(call.params, null, 2)}`;
                            toolsData.appendChild(pre);
                        });
                    } else {
                        toolsData.textContent = "本次请求未调用外部工具";
                    }
                } else {
                    appendMessage('agent', `错误: ${response.status} ${response.statusText}`);
                }
            } catch (error) {
                appendMessage('agent', `无法连接到服务器: ${error.message}`);
                console.error(error);
            } finally {
                sendBtn.disabled = false;
                loadingSpinner.classList.add('hidden');
            }
        }

        sendBtn.addEventListener('click', () => sendQuery());
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuery();
        });
    </script>
</body>
</html>
